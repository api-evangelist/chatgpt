principles:
  - name: Visibility
    description: Use the OpenAI Platform usage dashboard, the /v1/usage and /v1/organization/costs APIs,
      and per-project API keys to break out token consumption by team/project; ChatGPT seat usage is
      visible in the workspace admin console.
  - name: Allocation
    description: Tag API keys per project; use OpenAI Projects to scope budgets and route invoices.
      For ChatGPT seats, allocate by workspace / department.
  - name: Optimization
    description: Use prompt caching (50% off cached input tokens), the Batch API (~50% off, 24-hour
      SLA), structured outputs to reduce retries, and lighter models (gpt-4o-mini, o-series-mini) where
      quality permits. Right-size frontier-model use to actual reasoning needs.
  - name: Accountability
    description: Set per-project hard spend limits; enable email alerts on usage thresholds; review
      monthly invoice line items against project budgets and renegotiate Enterprise terms based on observed
      consumption.
maintainers:
