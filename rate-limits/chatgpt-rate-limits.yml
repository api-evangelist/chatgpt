specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: ChatGPT
providerId: chatgpt
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Artificial Intelligence
  - LLM
description: ChatGPT consumer/business tiers throttle frontier-model usage via "messages per N hours"
  caps which OpenAI documents on the pricing/help center pages and may adjust dynamically. The OpenAI
  Platform API enforces per-organization tier-based limits across requests-per-minute (RPM), tokens-per-minute
  (TPM), and tokens-per-day (TPD); customers progress through usage tiers (Free, Tier 1-5) as cumulative
  spend grows. Limits vary per model.
sources:
  - https://platform.openai.com/docs/guides/rate-limits
  - https://platform.openai.com/account/limits
  - https://help.openai.com/en/articles/8983778-what-are-the-rate-limits-of-chatgpt
headers:
  remaining: x-ratelimit-remaining-requests
  remainingTokens: x-ratelimit-remaining-tokens
  resetRequests: x-ratelimit-reset-requests
  resetTokens: x-ratelimit-reset-tokens
  limit: x-ratelimit-limit-requests
responseCodes:
  throttled: 429
  unauthorized: 401
  serviceUnavailable: 503
limits:
  - name: ChatGPT Free (frontier model messages)
    scope: account
    metric: messages
    limit: see help center; rolling-window cap on GPT-4o-class messages
  - name: ChatGPT Plus / Pro (frontier model messages)
    scope: account
    metric: messages
    limit: see help center; higher caps for Plus, near-unlimited for Pro
  - name: Platform API - Free tier
    scope: organization
    metric: tokens_per_minute
    limit: see https://platform.openai.com/account/limits
  - name: Platform API - Tier 1 to Tier 5
    scope: organization/model
    metric: requests_per_minute
    limit: see https://platform.openai.com/account/limits
  - name: Platform API - Tier 1 to Tier 5
    scope: organization/model
    metric: tokens_per_minute
    limit: see https://platform.openai.com/account/limits
  - name: Platform API - daily token cap
    scope: organization/model
    metric: tokens_per_day
    limit: see https://platform.openai.com/account/limits
policies:
  - name: Tier progression
    description: API usage tiers (Free, 1-5) auto-promote based on payment history and cumulative spend;
      higher tiers carry significantly higher RPM/TPM ceilings.
  - name: Backoff Strategy
    description: Use exponential backoff on 429 and honor x-ratelimit-reset-* hints. The OpenAI client
      libraries implement automatic retries with jitter.
  - name: Per-model limits
    description: RPM/TPM caps are enforced per model; using a higher-cost reasoning model consumes a
      different bucket than GPT-4o.
  - name: Batch API
    description: The /v1/batches endpoint provides a 24-hour async path with much higher token quotas
      and ~50% discount for non-time-sensitive workloads.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
