specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: ChatGPT
providerId: chatgpt
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Artificial Intelligence
  - LLM
  - Conversational AI
  - SaaS
description: ChatGPT is OpenAI's hosted assistant product, sold as consumer and business subscription
  tiers (Free, Plus, Pro, Team, Enterprise, Edu) with per-seat monthly pricing. Developer access to
  the underlying GPT models is sold separately through the OpenAI Platform API on a per-token usage
  basis. Subscription tiers gate model access (frontier vs lighter models), tool/feature availability,
  and usage caps; high-volume model API consumption is metered per million tokens.
sources:
  - https://openai.com/chatgpt/pricing
  - https://openai.com/api/pricing
  - https://platform.openai.com/docs/pricing
plans:
  - id: chatgpt-free
    name: Free
    type: freemium
    description: Free ChatGPT access with limits on frontier models and advanced features.
    entries:
      - label: Monthly subscription
        name: subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: true
    elements:
      - name: Access to GPT-4o-class models with usage caps
      - name: Limited file uploads, advanced data analysis, image generation
      - name: Standard voice mode
  - id: chatgpt-plus
    name: Plus
    type: subscription
    description: Consumer paid tier; expanded access to frontier models and tools.
    entries:
      - label: Monthly subscription
        name: subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '20.00'
        userMultiplied: true
    elements:
      - name: Higher usage limits on GPT-4o, GPT-4.1 / o-series
      - name: Advanced Voice Mode
      - name: DALL-E image generation
      - name: Custom GPTs and Sora preview where available
  - id: chatgpt-pro
    name: Pro
    type: subscription
    description: Power-user tier with near-unlimited access to frontier reasoning models.
    entries:
      - label: Monthly subscription
        name: subscription
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '200.00'
        userMultiplied: true
    elements:
      - name: Pro mode for advanced reasoning models
      - name: Highest usage limits across GPT and o-series models
      - name: Expanded Sora video generation
  - id: chatgpt-team
    name: Team
    type: subscription
    description: Small-business plan with admin console and shared workspace; billed per-seat with annual
      and monthly options.
    entries:
      - label: Per-seat monthly (annual billing)
        name: team_annual
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '25.00'
        userMultiplied: true
      - label: Per-seat monthly (monthly billing)
        name: team_monthly
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '30.00'
        userMultiplied: true
    elements:
      - name: Shared workspace and custom GPTs
      - name: Admin console
      - name: Data excluded from training by default
  - id: chatgpt-enterprise
    name: Enterprise
    type: enterprise
    description: Enterprise tier with SAML SSO, SOC 2, custom data retention, and unlimited high-speed
      access. Custom pricing.
    entries:
      - label: Enterprise seat
        name: enterprise
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: SAML SSO and SCIM
      - name: SOC 2 Type 2 compliance
      - name: Unlimited high-speed access to frontier models
      - name: Admin controls and audit logging
      - name: Custom data retention
  - id: chatgpt-edu
    name: Edu
    type: enterprise
    description: ChatGPT for universities and academic institutions. Custom pricing.
    entries:
      - label: Edu seat
        name: edu
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Enterprise security controls
      - name: Group/role management for academic units
  - id: chatgpt-api-platform
    name: OpenAI Platform API
    type: usage-based
    description: Developer-facing per-token model APIs. Pricing varies per model and is published on
      the OpenAI pricing page; values change frequently.
    entries:
      - label: Per-token model usage
        name: tokens
        type: metered
        metric: token
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1000000
        price: see https://openai.com/api/pricing
        userMultiplied: false
    elements:
      - name: GPT-4o / GPT-4.1 family
      - name: o-series reasoning models
      - name: Embeddings and moderation models
      - name: Image, audio, and fine-tuning models
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
